     Emilie's ask: feel the pure options before the verdict. Same 35 pieces,
     same full-bleed world, three grammars:
       NERVE ONLY  — no skeleton: everything is a neuron, correlations sing,
                     but position carries no fact except left-to-right time.
       RULER ONLY  — no neurons: the elevated commit graph, everything a mark
                     on its true lane; facts sing, no idea ever touches another.
       MERGED      — the world as proposed: ruler beneath, nerve above.
     Flip between them in place; what disappears is the argument. */
  html, body { height: 100%; }

  .stage.dragging { cursor: grabbing; }
  .stage svg { height: 100%; width: auto; display: block; }

  .kicker { color: var(--interaction); }

  .seg { display: inline-flex; padding: 3px; gap: 3px; border-radius: var(--r-pill); background: var(--glass-2); border: .5px solid var(--glass-2-border); backdrop-filter: blur(var(--blur)); }
  .seg button { font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; padding: 8px 13px; min-height: 38px; border-radius: var(--r-pill); border: none; background: none; color: var(--ink-muted); cursor: pointer; }
  .seg button[aria-pressed='true'] { background: var(--ink); color: var(--ground); }
  .studioctl { display: flex; gap: 6px; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
  .studioctl button { font-family: var(--mono); font-size: 9px; letter-spacing: .06em; min-height: 38px; padding: 6px 11px; border-radius: var(--r-pill); background: var(--glass-2); border: .5px solid var(--glass-2-border); backdrop-filter: blur(var(--blur)); color: var(--ink); cursor: pointer; }

  @keyframes draw { to { stroke-dashoffset: 0; } }

  }

    /* year columns (all variants: time is shared DNA) */
    var seen={};
    sorted.forEach(function(c){var yr=c.date.slice(0,4);if(seen[yr])return;seen[yr]=1;
      make('line',{'class':'yearline',x1:c.baseX-34,y1:96,x2:c.baseX-34,y2:H-40},gYears);
      var t=make('text',{'class':'yearlbl',x:c.baseX-26,y:H-46},gYears);t.textContent=yr;
    });

    /* the skeleton (ruler + merge) */
    if(variant!=='nerve'){
      var xSelf=byId['self-open'].baseX,xSoma=byId['soma-start'].baseX,xDyn=byId['dynamic-start'].baseX,xMacad=byId['macad-start'].baseX;
      var Y=LANEY,XL=X0-90,XR=X1+80;
      function lane(d,cls){return make('path',{'class':'lane'+(cls?' '+cls:''),d:d,'stroke-width':cls==='mainline'?1.7:1.2,'pathLength':1},gLanes);}
      lane(spline([[XL,Y.main+6],[byId['xrlab-start'].baseX,Y.main],[byId['barch-grad'].baseX,Y.main-6],[xDyn,Y.main+4],[XR,Y.main-2]]),'mainline');
      lane(spline([[xSelf-70,Y.main],[xSelf,Y.self+30],[xSelf+60,Y.self],[xMacad,Y.self-6],[XR-40,Y.self]]),'');
      lane(spline([[xSoma-70,Y.main],[xSoma,Y.soma-22],[xSoma+70,Y.soma],[xDyn-90,Y.soma],[xDyn-10,Y.main+6]]),'');
      lane(spline([[xDyn-70,Y.main],[xDyn,Y.dyn-22],[xDyn+80,Y.dyn],[XR,Y.dyn-4]]),'');
      lane(spline([[xMacad-70,Y.self],[xMacad,Y.macad+26],[xMacad+70,Y.macad],[XR,Y.macad-4]]),'');
      [['B.ARCH › NOW · THE MAIN LINE',XL+16,Y.main-12],['SELF-EMPLOYED · 2022 › NOW',xSelf+70,Y.self-12],['SOMA · 2023›24',xSoma+70,Y.soma-10],['DYNAMIC · 2024 › NOW',xDyn+86,Y.dyn-10],['MACAD · 2025 › NOW',xMacad+76,Y.macad-10]].forEach(function(L){var t=make('text',{'class':'lanelbl',x:L[1],y:L[2]},gLanes);t.textContent=L[0];});
      var lt=make('g',{'class':'livetip'},gLanes);
      make('line',{x1:XR-40,y1:Y.self,x2:XR-6,y2:Y.self,stroke:'var(--interaction)','stroke-width':1.7},lt);
      make('circle',{cx:XR-6,cy:Y.self,r:4,fill:'var(--ground)',stroke:'var(--interaction)','stroke-width':1.8},lt);
      var ltt=make('text',{'class':'livetag',x:XR-14,y:Y.self-12,'text-anchor':'end'},lt);ltt.textContent='LIVE · STILL GROWING';
    } else {
      /* nerve only: liveness moves to the newest piece (red ring, still red = live) */
      var newest=sorted[sorted.length-1];
      var lt2=make('g',{'class':'livetip'},gLanes);
      make('circle',{cx:newest.baseX,cy:170,r:14,fill:'none',stroke:'var(--interaction)','stroke-width':1.6},lt2);
      var lt2t=make('text',{'class':'livetag',x:newest.baseX-20,y:146,'text-anchor':'end'},lt2);lt2t.textContent='LIVE · STILL THINKING';
    }

    /* correlations (nerve + merge only: the ruler cannot draw them; that IS its weakness) */
    if(variant!=='ruler'){
      LINKS.forEach(function(L){
        var a=byId[L[0]],b=byId[L[1]];if(!a||!b)return;
        var later=(a.date>b.date)?a:b;
        var col=later.lens?LENS[later.lens]:(a.lens?LENS[a.lens]:(b.lens?LENS[b.lens]:'var(--ink)'));
        var mx=(a.x+b.x)/2+(a.rank%2?14:-14),my=(a.y+b.y)/2-(Math.abs(a.x-b.x)>260?46:22);
        var g=make('g',{},gConns);
        var rA=make('path',{'class':'reach',d:spline([[a.x,a.y],[(a.x+mx)/2,(a.y+my)/2-8],[mx,my]]),stroke:'var(--ink)','stroke-width':1.15,'pathLength':1},g);
        var rB=make('path',{'class':'reach',d:spline([[b.x,b.y],[(b.x+mx)/2,(b.y+my)/2+8],[mx,my]]),stroke:'var(--ink)','stroke-width':1.15,'pathLength':1},g);
        var syn=make('circle',{'class':'synapse',cx:mx,cy:my,r:2.6,fill:'var(--ground)',stroke:col,'stroke-width':1.5},g);
        var pulse=make('path',{'class':'pulse',d:spline([[a.x,a.y],[mx,my],[b.x,b.y]]),stroke:col,'stroke-width':2.5,'pathLength':1,'stroke-dasharray':'0.12 1'},g);
        connEls.push({a:L[0],b:L[1],later:later.id,els:[rA,rB],syn:syn,pulse:pulse});
      });
    }

    /* the pieces */
    sorted.forEach(function(c){
      var o=STYLE[c.k],col=c.lens?LENS[c.lens]:'var(--ink)';
      var g=make('g',{'class':'node',tabindex:0,role:'link','aria-label':c.title+' — '+KINDNAME[c.k]+', '+c.date+'. Open it.'},gNodes);
      if(variant!=='ruler'){
        var mo=(variant==='merge'&&c.k==='m')?{count:0}:o; /* merge: milestones are the ruler's */
        dendrites(c.x,c.y,c.rank*97+11,mo.count?o:{count:0}).forEach(function(pts){
          make('path',{'class':'dendrite',d:spline(pts),stroke:col,'stroke-width':o.baseW*2.2,opacity:0.09,'pathLength':1,filter:'url(#w-soft)'},g);
          make('path',{'class':'dendrite',d:spline(pts),'stroke-width':o.baseW,'pathLength':1,stroke:'var(--ink)'},g);
        });
        if(c.k!=='m')make('circle',{'class':'soma-glow',cx:c.x,cy:c.y,r:o.r*3,fill:'url(#w-glow)'},g);
      }
      var rr=(variant==='ruler')?Math.max(3,o.r*0.72):o.r; /* ruler: calmer marks */
      if(c.k==='p'){make('circle',{'class':'soma',cx:c.x,cy:c.y,r:rr,fill:'var(--ink)'},g);make('circle',{cx:c.x,cy:c.y,r:rr*0.36,fill:col},g);}
      else if(c.k==='t'){make('circle',{'class':'soma',cx:c.x,cy:c.y,r:rr,fill:'var(--ground)',stroke:'var(--ink)','stroke-width':1.7},g);make('circle',{cx:c.x,cy:c.y,r:1.9,fill:col,opacity:0.8},g);}
      else if(c.k==='a'){make('path',{'class':'soma',d:starPath(c.x,c.y,rr),fill:'var(--ink)'},g);}
      else {make('circle',{'class':'soma',cx:c.x,cy:c.y,r:o.r,fill:'var(--ink-muted)'},g);}
      make('circle',{'class':'hit',cx:c.x,cy:c.y,r:26},g);
      var ly;
      if(variant==='ruler'){var offs=[-16,24,-30,38];ly=c.y+offs[c.tier||0];}
      else{var above=(c.k==='t')||(c.k==='p'&&c.rank%2===0);ly=c.k==='m'?c.y+18:(above?c.y-o.r-12:c.y+o.r+18);}
      var lbl=make('text',{'class':'lbl '+c.k,x:c.x,y:ly,'text-anchor':'middle'},g);lbl.textContent=c.title;
      var yr=make('text',{'class':'yr',x:c.x,y:ly+((variant!=='ruler'&&((c.k==='t')||(c.k==='p'&&c.rank%2===0))&&c.k!=='m')?-13:12),'text-anchor':'middle'},g);yr.textContent=c.date;
      nodeEls[c.id]=g;bind(c,g);
    });
    document.getElementById('loss').innerHTML=LOSS[variant];
  }

  function firePulse(cn,delay,transient){
    if(PRM.matches){cn.els.forEach(function(e){e.classList.add('lit');});cn.syn.classList.add('lit');
      if(transient)setTimeout(function(){cn.els.forEach(function(e){e.classList.remove('lit');});cn.syn.classList.remove('lit');},900);return;}
    setTimeout(function(){var p=cn.pulse;p.classList.remove('firing');void p.getBoundingClientRect();p.classList.add('firing');
      cn.els.forEach(function(e){e.classList.add('lit');});cn.syn.classList.add('lit');
      if(transient)setTimeout(function(){cn.els.forEach(function(e){e.classList.remove('lit');});cn.syn.classList.remove('lit');},1000);},delay||0);}
  function light(id){stage.classList.add('is-focus');var g=nodeEls[id];if(g)g.classList.add('on');
    connEls.forEach(function(cn){if(cn.a===id||cn.b===id){firePulse(cn,0,false);var other=cn.a===id?cn.b:cn.a;if(nodeEls[other])nodeEls[other].classList.add('near');}});
    var c=byId[id];
    if(variant==='merge'&&c&&c.k!=='m'){
      plumbEls.push(make('line',{'class':'plumb',x1:c.x,y1:c.y+14,x2:c.x,y2:654,'stroke-width':1},gLanes));
      plumbEls.push(make('circle',{cx:c.x,cy:660,r:3,fill:'var(--ink)'},gLanes));
    }
    if(variant==='ruler'&&c){ /* the ruler's own answer: light the lane */
      sorted.forEach(function(o){if(o.lane===c.lane&&nodeEls[o.id]&&o.id!==id)nodeEls[o.id].classList.add('near');});
    }
    showCard(id);}
  function clearLight(){stage.classList.remove('is-focus');Object.keys(nodeEls).forEach(function(k){nodeEls[k].classList.remove('on','near');});
    connEls.forEach(function(cn){cn.els.forEach(function(e){e.classList.remove('lit');});cn.syn.classList.remove('lit');});
    plumbEls.forEach(function(e){e.remove();});plumbEls=[];
    if(card)card.classList.remove('show');}
  function showCard(id){var c=byId[id];if(!c)return;
    if(!card){card=document.createElement('aside');card.className='fieldcard glass-2';card.setAttribute('aria-hidden','true');document.body.appendChild(card);}
    var kindLbl={p:'PROJECT',t:'THOUGHT',a:'RECOGNITION',m:'MILESTONE'}[c.k];
    card.innerHTML='<div class="meta"><span>'+c.date+'</span><span>'+kindLbl+'</span></div><h3 class="'+(c.k==='t'?'':'up')+'">'+c.title+'</h3>'+(c.blurb?'<p>'+c.blurb+'</p>':'');
    var soma=nodeEls[id].querySelector('.soma');var b=soma.getBoundingClientRect();
    var left=Math.max(12,Math.min(b.left+b.width/2-150,innerWidth-312));
    var top=(b.top<innerHeight*0.5)?(b.bottom+14):(b.top-170);
    card.style.left=left+'px';card.style.top=Math.max(80,top)+'px';card.classList.add('show');}
  function bind(c,g){g.addEventListener('mouseenter',function(){clearLight();light(c.id);});g.addEventListener('mouseleave',clearLight);
    g.addEventListener('focus',function(){clearLight();light(c.id);g.scrollIntoView({block:'nearest',inline:'center',behavior:PRM.matches?'auto':'smooth'});});
    g.addEventListener('blur',clearLight);
    g.addEventListener('click',function(){console.log('open '+c.k+' '+c.id);});
    g.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();console.log('open '+c.k+' '+c.id);}});}

  function develop(){
    if(PRM.matches){stage.classList.remove('intro');return;}
    stage.classList.remove('intro');void stage.getBoundingClientRect();stage.classList.add('intro');
    Array.prototype.forEach.call(gLanes.querySelectorAll('.lane'),function(el,i){el.style.animationDelay=(i*120)+'ms';});
    Array.prototype.forEach.call(gYears.querySelectorAll('*'),function(el){el.style.animationDelay='300ms';});
    Array.prototype.forEach.call(gLanes.querySelectorAll('.lanelbl,.livetag'),function(el){el.style.animationDelay='700ms';});
    sorted.forEach(function(c,i){var g=nodeEls[c.id];if(!g)return;var t=500+i*150;
      Array.prototype.forEach.call(g.querySelectorAll('.dendrite'),function(el){el.style.animationDelay=t+'ms';});
      Array.prototype.forEach.call(g.querySelectorAll('.soma,.soma-glow'),function(el){el.style.animationDelay=(t+230)+'ms';});
      Array.prototype.forEach.call(g.querySelectorAll('.lbl,.yr'),function(el){el.style.animationDelay=(t+330)+'ms';});});
    connEls.forEach(function(cn){var later=byId[cn.later];var ti=later?later.rank:0;var t=500+ti*150;
      cn.els.forEach(function(el){el.style.animationDelay=(t+160)+'ms';});
      cn.syn.style.animationDelay=(t+780)+'ms';
      firePulse(cn,t+900,true);});
    autopan(500+sorted.length*150+800);
    setTimeout(function(){stage.classList.remove('intro');},500+sorted.length*150+1600);
  }
  var panRaf=null;
  function autopan(dur){
    if(PRM.matches)return;
    if(panRaf)cancelAnimationFrame(panRaf);
    var max=stage.scrollWidth-stage.clientWidth;if(max<=0)return;
    var t0=performance.now();stage.scrollLeft=0;var stopped=false;
    stage.addEventListener('pointerdown',function(){stopped=true;},{once:true});
    (function step(now){if(stopped)return;var k=Math.min(1,(now-t0)/dur);stage.scrollLeft=max*(k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2);if(k<1)panRaf=requestAnimationFrame(step);})(t0);
  }

  var drag=null;
  stage.addEventListener('pointerdown',function(e){if(e.target.closest('.node'))return;drag={x:e.clientX,s:stage.scrollLeft};stage.classList.add('dragging');});
  window.addEventListener('pointermove',function(e){if(!drag)return;stage.scrollLeft=drag.s-(e.clientX-drag.x);});
  window.addEventListener('pointerup',function(){drag=null;stage.classList.remove('dragging');});
  stage.addEventListener('wheel',function(e){if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){stage.scrollLeft+=e.deltaY;e.preventDefault();}},{passive:false});

  (function(){var ul=document.getElementById('sr-nav');sorted.forEach(function(c){var li=document.createElement('li');var a=document.createElement('a');a.href='#'+c.id;a.textContent=c.title+' ('+KINDNAME[c.k]+', '+c.date+')';li.appendChild(a);ul.appendChild(li);});})();

  var segs={nerve:document.getElementById('v-nerve'),ruler:document.getElementById('v-ruler'),merge:document.getElementById('v-merge')};
  function setVariant(v){variant=v;
    Object.keys(segs).forEach(function(k){segs[k].setAttribute('aria-pressed',k===v);});
    stage.classList.remove('v-nerve','v-ruler','v-merge');stage.classList.add('v-'+v);
    clearLight();build();develop();}
  segs.nerve.addEventListener('click',function(){setVariant('nerve');});
  segs.ruler.addEventListener('click',function(){setVariant('ruler');});
  segs.merge.addEventListener('click',function(){setVariant('merge');});
  document.getElementById('replay').addEventListener('click',develop);
  document.getElementById('mode').addEventListener('click',function(){var c=document.documentElement.dataset.theme;document.documentElement.dataset.theme=c==='light'?'dark':c==='dark'?'light':(window.matchMedia('(prefers-color-scheme: dark)').matches?'light':'dark');});

  build();requestAnimationFrame(develop);
})();
</script>
</body>
</html>
