name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PII guard (Session 7.5): the term list lives ONLY in the PII_TERMS
      # repo secret (one case-insensitive extended regex per line), never in
      # the repo. On a hit it prints matching file PATHS only, never content.
      - name: PII guard
        env:
          PII_TERMS: ${{ secrets.PII_TERMS }}
        run: |
          if [ -z "$PII_TERMS" ]; then
            echo "PII guard: PII_TERMS secret is unset; failing closed." >&2
            exit 1
          fi
          printf '%s\n' "$PII_TERMS" > "$RUNNER_TEMP/pii-terms.txt"
          if grep -rIliE -f "$RUNNER_TEMP/pii-terms.txt" . --exclude-dir=.git; then
            echo "::error::PII guard: a listed term appears in the files above."
            exit 1
          fi
          echo "PII guard clean."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      # G5: puppeteer's Chrome (~170MB) lives outside the npm cache; caching
      # it keyed to the lockfile lets its postinstall skip the CDN download
      # on every deploy after the first.
      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}
      - run: npm ci
        working-directory: site
      # Registry guardrails (snapshot + validator) fail the deploy here, with
      # clean attribution, before the heavier build (which also runs them).
      - run: npm test
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
