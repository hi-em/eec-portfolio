<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EXPLORE | Emilie El Chidiac</title>
<style>
@font-face { font-family: 'Martian Mono'; src: url('fonts/martian-mono-400.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Source Serif 4'; src: url('fonts/source-serif-var-italic.woff2') format('woff2'); font-weight: 200 900; font-style: italic; }
html, body { margin: 0; height: 100%; background: #0B0E13; overflow: hidden; font-family: 'Martian Mono', ui-monospace, monospace; }
canvas { display: block; }
#leader { position: fixed; inset: 0; pointer-events: none; }
.hud { position: fixed; top: 14px; left: 16px; font-size: 10px; letter-spacing: 0.12em; line-height: 2; color: #8A919C; pointer-events: none; z-index: 3; }
.hud b { color: #E8EAED; font-weight: 400; }
.toggle { position: fixed; top: 14px; right: 16px; z-index: 3; font-family: 'Martian Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 0.12em; color: #FF4D6D; text-decoration: underline; text-underline-offset: 4px; padding: 8px; }
.legend { position: fixed; bottom: 14px; left: 16px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 9px; letter-spacing: 0.1em; color: #8A919C; align-items: center; pointer-events: none; z-index: 3; }
.legend .li { display: inline-flex; gap: 6px; align-items: center; }
.lbl { position: fixed; font-size: 9px; letter-spacing: 0.12em; color: #FF4D6D; pointer-events: none; white-space: nowrap; display: none; }
.info { position: fixed; right: 16px; bottom: 16px; max-width: 300px; border: 1px solid rgba(232,234,237,0.25); background: rgba(11,14,19,0.9); padding: 12px 14px; font-size: 10px; line-height: 1.9; letter-spacing: 0.06em; color: #E8EAED; display: none; z-index: 3; }
.info .k { color: #8A919C; }
.info .x { color: #FF4D6D; }
.info a { color: #FF4D6D; text-decoration: underline; text-underline-offset: 3px; }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
</head>
<body>
<div class="hud">EMILIE EL CHIDIAC · <b>EXPLORE</b><br>PROJECTS AND THOUGHTS, CONNECTED BY THEME &middot; EDGES APPEAR WHILE YOU ASK<br>DRAG ORBIT &middot; CLICK A WORD TO FOLLOW IT &middot; ESC RETURNS</div>
<a class="toggle" href="Site Home.dc.html">ISSUED FOR: READ &gt;</a>
<div class="legend" id="legend"></div>
<canvas id="leader"></canvas>
<div class="lbl" id="hoverLbl"></div>
<div class="info" id="info"></div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { makeGraph, LENSES, REDLINE, EDGE, CARBON, neighbors, LEGEND_HTML } from './explore/data.js';

document.getElementById('legend').innerHTML = LEGEND_HTML + '<span>MONO CAPS = PROJECT &middot; SERIF ITALIC = THOUGHT</span>';

const PRM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const g = makeGraph();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(CARBON);
document.body.appendChild(renderer.domElement);

const F = 150;
let aspect = innerWidth / innerHeight;
const camera = new THREE.OrthographicCamera(-F * aspect, F * aspect, F, -F, -800, 1600);
camera.position.set(140, 115, 140);
camera.lookAt(0, 0, 0);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
let lastInteract = 0;
controls.addEventListener('start', () => { lastInteract = performance.now(); });

const scene = new THREE.Scene();

{
  const pts = [];
  for (let x = -12; x <= 12; x++) for (let z = -12; z <= 12; z++) pts.push(x * 22, -110, z * 22);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: EDGE, size: 1.4, sizeAttenuation: false, transparent: true, opacity: 0.1 })));
}

function drawTick(ctx, lens, x, y, s) {
  ctx.beginPath();
  if (LENSES[lens].tick === 'square') ctx.rect(x, y - s / 2, s, s);
  else if (LENSES[lens].tick === 'diamond') { ctx.moveTo(x + s / 2, y - s / 2); ctx.lineTo(x + s, y); ctx.lineTo(x + s / 2, y + s / 2); ctx.lineTo(x, y); ctx.closePath(); }
  else { ctx.moveTo(x, y + s / 2); ctx.lineTo(x + s, y + s / 2); ctx.lineTo(x + s / 2, y - s / 2); ctx.closePath(); }
  ctx.fill();
}
function makeTexture(n, red) {
  const isP = n.kind === 'project';
  const font = isP ? "26px 'Martian Mono'" : "italic 30px 'Source Serif 4'";
  const c = document.createElement('canvas');
  let x = c.getContext('2d');
  x.font = font;
  const tw = x.measureText(n.label).width;
  const tick = 14, gap = 10, pad = 8;
  c.width = Math.ceil(tw + tick + gap + pad * 2);
  c.height = 52;
  const ctx = c.getContext('2d');
  const color = red ? REDLINE : LENSES[n.lens].wire;
  ctx.globalAlpha = isP ? 1 : 0.78;
  ctx.fillStyle = color;
  drawTick(ctx, n.lens, pad, 27, tick * 0.7);
  ctx.font = font;
  ctx.textBaseline = 'middle';
  ctx.fillText(n.label, pad + tick + gap - 4, 28);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return { tex, w: c.width, h: c.height };
}

const sprites = [];
let hiGeo, hiMat, hipos;
let entryDone = PRM;
const ENTRY_STAGGER = 28, ENTRY_DUR = 620, ENTRY_DELAY = 120;
let entryT0 = 0;

async function build() {
  try {
    await document.fonts.load("26px 'Martian Mono'");
    await document.fonts.load("italic 30px 'Source Serif 4'");
  } catch (e) {}

  g.nodes.forEach((n, i) => {
    const norm = makeTexture(n, false);
    const hot = makeTexture(n, true);
    const mat = new THREE.SpriteMaterial({ map: norm.tex, transparent: true, opacity: PRM ? (n.kind === 'project' ? 1 : 0.85) : 0 });
    const sp = new THREE.Sprite(mat);
    const k = n.kind === 'project' ? 7.2 : 6.0;
    sp.scale.set(norm.w / k, norm.h / k, 1);
    const fx = n.x * 1.12, fy = n.y * 0.72, fz = n.z * 1.12;
    sp.position.set(fx, fy, fz);
    let cloud = null;
    if (!PRM) {
      const count = 26;
      const pos = new Float32Array(count * 3);
      const scatter = new Float32Array(count * 3);
      for (let q = 0; q < count; q++) {
        const m = 14 + Math.random() * 22;
        const uu = Math.random() * 2 - 1, th = Math.random() * Math.PI * 2, s = Math.sqrt(1 - uu * uu);
        scatter.set([s * Math.cos(th) * m, uu * m, s * Math.sin(th) * m], q * 3);
        pos.set([fx + scatter[q * 3], fy + scatter[q * 3 + 1], fz + scatter[q * 3 + 2]], q * 3);
      }
      const cg = new THREE.BufferGeometry();
      cg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const cm = new THREE.PointsMaterial({ color: LENSES[n.lens].wire, size: 1.8, sizeAttenuation: false, transparent: true, opacity: 0.85 });
      const cp = new THREE.Points(cg, cm);
      scene.add(cp);
      cloud = { cp, cg, cm, pos, scatter, count, fx, fy, fz };
    }
    sp.userData = {
      i: n.i, norm: norm.tex, hot: hot.tex, baseScale: sp.scale.clone(), baseY: fy,
      s: 1, v: 0, baseOpacity: n.kind === 'project' ? 1 : 0.85, phase: Math.random() * 6.28,
      cloud, start: ENTRY_DELAY + i * ENTRY_STAGGER,
    };
    scene.add(sp);
    sprites.push(sp);
  });

  hipos = new Float32Array(g.edges.length * 6);
  hiGeo = new THREE.BufferGeometry();
  hiGeo.setAttribute('position', new THREE.BufferAttribute(hipos, 3));
  hiGeo.setDrawRange(0, 0);
  hiMat = new THREE.LineBasicMaterial({ color: EDGE, transparent: true, opacity: 0 });
  scene.add(new THREE.LineSegments(hiGeo, hiMat));

  entryT0 = performance.now();
  frame();
}

function stepEntry(now) {
  if (entryDone) return;
  let allDone = true;
  const el = now - entryT0;
  sprites.forEach((sp) => {
    const u = sp.userData;
    if (!u.cloud) return;
    const t = Math.max(0, Math.min(1, (el - u.start) / ENTRY_DUR));
    if (t < 1) allDone = false;
    const e = 1 - Math.pow(1 - t, 3);
    const c = u.cloud;
    for (let q = 0; q < c.count; q++) {
      const q3 = q * 3;
      c.pos[q3] = c.fx + c.scatter[q3] * (1 - e);
      c.pos[q3 + 1] = c.fy + c.scatter[q3 + 1] * (1 - e);
      c.pos[q3 + 2] = c.fz + c.scatter[q3 + 2] * (1 - e);
    }
    c.cg.attributes.position.needsUpdate = true;
    c.cm.opacity = 0.85 * (1 - e * e);
    sp.material.opacity = u.baseOpacity * Math.max(0, (t - 0.35) / 0.65);
    const sc = 1 + 0.14 * (1 - e);
    sp.scale.set(u.baseScale.x * sc, u.baseScale.y * sc, 1);
  });
  if (allDone) {
    entryDone = true;
    sprites.forEach((sp) => {
      const u = sp.userData;
      if (u.cloud) { scene.remove(u.cloud.cp); u.cloud.cg.dispose(); u.cloud = null; }
      sp.material.opacity = u.baseOpacity;
    });
  }
}

function setHiEdges(i) {
  let c = 0;
  g.edges.forEach((e) => {
    if (e.a === i || e.b === i) {
      const a = sprites[e.a].position, b = sprites[e.b].position;
      hipos.set([a.x, a.y, a.z, b.x, b.y, b.z], c * 6);
      c++;
    }
  });
  hiGeo.attributes.position.needsUpdate = true;
  hiGeo.setDrawRange(0, c * 2);
}

const tweens = [];
function tw(dur, step, done) { tweens.push({ t0: performance.now(), dur, step, done }); }
function runTweens() {
  const now = performance.now();
  for (let i = tweens.length - 1; i >= 0; i--) {
    const t = tweens[i];
    const k = Math.min(1, (now - t.t0) / t.dur);
    const e = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
    t.step(e);
    if (k >= 1) { tweens.splice(i, 1); if (t.done) t.done(); }
  }
}
function edgesTo(target, dur) {
  const o0 = hiMat.opacity;
  tw(PRM ? 1 : dur, (e) => { hiMat.opacity = o0 + (target - o0) * e; });
}

const leader = document.getElementById('leader');
const lctx = leader.getContext('2d');
function sizeLeader() { leader.width = innerWidth * devicePixelRatio; leader.height = innerHeight * devicePixelRatio; leader.style.width = innerWidth + 'px'; leader.style.height = innerHeight + 'px'; lctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0); }
sizeLeader();
const hoverLbl = document.getElementById('hoverLbl');

const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2(-2, -2);
addEventListener('pointermove', (ev) => {
  ptr.x = (ev.clientX / innerWidth) * 2 - 1;
  ptr.y = -(ev.clientY / innerHeight) * 2 + 1;
});

let hovered = -1, hovStart = 0, focused = -1, saved = null;
const info = document.getElementById('info');
const v3 = new THREE.Vector3();
function screenPos(obj) {
  v3.copy(obj.position).project(camera);
  return { x: (v3.x * 0.5 + 0.5) * innerWidth, y: (-v3.y * 0.5 + 0.5) * innerHeight, behind: v3.z > 1 };
}

function focus(i) {
  focused = i;
  const n = g.nodes[i];
  saved = { zoom: camera.zoom, tgt: controls.target.clone() };
  const z0 = camera.zoom, t0 = controls.target.clone();
  const np = sprites[i].position.clone();
  tw(PRM ? 1 : 800, (e) => { camera.zoom = z0 + (2.9 - z0) * e; camera.updateProjectionMatrix(); controls.target.lerpVectors(t0, np, e); });
  const nb = neighbors(g, i);
  sprites.forEach((s, j) => {
    const t = j === i || nb.has(j) ? s.userData.baseOpacity : 0.07;
    const o0 = s.material.opacity;
    tw(PRM ? 1 : 600, (e) => { s.material.opacity = o0 + (t - o0) * e; });
  });
  setHiEdges(i);
  edgesTo(0.4, 300);
  const sheetLine = n.id === 'ballooning'
    ? '<div><a href="Site P-104.dc.html">OPEN SHEET P-104 &gt;</a></div>'
    : '<div class="k">SHEET: IN PREPARATION</div>';
  info.style.display = 'block';
  info.innerHTML =
    '<div class="k">' + LENSES[n.lens].label + '</div>' +
    '<div class="x">' + n.label.toUpperCase() + '</div>' +
    '<div><span class="k">KIND </span>' + n.kind.toUpperCase() + '</div>' +
    '<div><span class="k">THREAD </span>' + [...nb].map((j) => g.nodes[j].label).join(' &middot; ') + '</div>' +
    sheetLine +
    '<div class="k">ESC OR CLICK BACKGROUND TO RETURN</div>';
}
function unfocus() {
  if (focused < 0) return;
  const z0 = camera.zoom, t0 = controls.target.clone();
  tw(PRM ? 1 : 700, (e) => { camera.zoom = z0 + (saved.zoom - z0) * e; camera.updateProjectionMatrix(); controls.target.lerpVectors(t0, saved.tgt, e); });
  sprites.forEach((s) => {
    const o0 = s.material.opacity;
    tw(PRM ? 1 : 600, (e) => { s.material.opacity = o0 + (s.userData.baseOpacity - o0) * e; });
  });
  edgesTo(0, 300);
  info.style.display = 'none';
  focused = -1;
}
addEventListener('keydown', (e) => { if (e.key === 'Escape') unfocus(); });
let downX = 0, downY = 0;
addEventListener('pointerdown', (e) => { downX = e.clientX; downY = e.clientY; lastInteract = performance.now(); });
addEventListener('pointerup', (e) => {
  if (e.target.closest && e.target.closest('a')) return;
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 5) return;
  if (hovered >= 0) { if (focused === hovered) unfocus(); else focus(hovered); }
  else if (focused >= 0) unfocus();
});
addEventListener('resize', () => {
  aspect = innerWidth / innerHeight;
  camera.left = -F * aspect; camera.right = F * aspect;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  sizeLeader();
});

const clock = new THREE.Clock();
function frame() {
  requestAnimationFrame(frame);
  const t = clock.elapsedTime;
  clock.getDelta();
  const now = performance.now();

  stepEntry(now);

  if (!PRM && now - lastInteract > 3000 && focused < 0) {
    controls.target.x += (Math.sin(t * 0.12) * 20 - controls.target.x) * 0.01;
    controls.target.y += (Math.cos(t * 0.09) * 12 - controls.target.y) * 0.01;
  }

  if (entryDone) {
    ray.setFromCamera(ptr, camera);
    const hit = ray.intersectObjects(sprites);
    const nh = hit.length ? hit[0].object.userData.i : -1;
    if (nh !== hovered) {
      if (hovered >= 0) sprites[hovered].material.map = sprites[hovered].userData.norm;
      hovered = nh;
      hovStart = now;
      document.body.style.cursor = hovered >= 0 ? 'pointer' : 'default';
      if (hovered >= 0) {
        sprites[hovered].material.map = sprites[hovered].userData.hot;
        if (focused < 0) { setHiEdges(hovered); edgesTo(0.35, 250); }
      } else if (focused < 0) {
        edgesTo(0, 250);
      }
    }

    sprites.forEach((s, j) => {
      const u = s.userData;
      const target = j === hovered ? 1.16 : 1;
      u.v += (target - u.s) * 0.16; u.v *= 0.8; u.s += u.v;
      s.scale.set(u.baseScale.x * u.s, u.baseScale.y * u.s, 1);
      if (!PRM && focused < 0) s.position.y = u.baseY + Math.sin(t * 0.7 + u.phase) * 1.4;
    });
  }

  lctx.clearRect(0, 0, innerWidth, innerHeight);
  if (hovered >= 0 && entryDone) {
    const sp = screenPos(sprites[hovered]);
    const n = g.nodes[hovered];
    const halfW = (sprites[hovered].scale.x / (2 * F * aspect)) * innerWidth * camera.zoom;
    const p = PRM ? 1 : Math.min(1, (now - hovStart) / 450);
    const x = sp.x + halfW * 0.55, y = sp.y;
    lctx.strokeStyle = REDLINE; lctx.fillStyle = REDLINE; lctx.lineWidth = 1.2;
    lctx.beginPath(); lctx.arc(x, y, 2.5, 0, 6.29); lctx.fill();
    const seg1 = Math.min(1, p * 2), seg2 = Math.max(0, p * 2 - 1);
    lctx.beginPath();
    lctx.moveTo(x, y);
    lctx.lineTo(x + 24 * seg1, y - 20 * seg1);
    if (seg2 > 0) lctx.lineTo(x + 24 + 40 * seg2, y - 20);
    lctx.stroke();
    if (p >= 1) { lctx.beginPath(); lctx.moveTo(x + 64, y - 23); lctx.lineTo(x + 70, y - 20); lctx.lineTo(x + 64, y - 17); lctx.closePath(); lctx.fill(); }
    hoverLbl.style.display = 'block';
    hoverLbl.style.left = (x + 74) + 'px';
    hoverLbl.style.top = (y - 26) + 'px';
    hoverLbl.textContent = n.label + ' · ' + n.kind.toUpperCase();
  } else {
    hoverLbl.style.display = 'none';
  }

  runTweens();
  controls.update();
  renderer.render(scene, camera);
}
build();
</script>
